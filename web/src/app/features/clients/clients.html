<app-grid
  title="العملاء"
  exportName="clients"
  [columns]="columns"
  [source]="service"
  [rowActions]="actions"
  [exportPermission]="'clients.export'"
  [createPermission]="'clients.write'"
  (createClicked)="openCreate()" />

<ng-template #actions let-row>
  @if (canWrite) { <button class="ghost" (click)="openEdit(row)">تعديل</button> }
  @if (canWrite) { <button class="ghost" (click)="toggleStatus(row)">تبديل الحالة</button> }
  @if (canDelete) { <button class="ghost danger-text" (click)="remove(row)">حذف</button> }
</ng-template>

@if (showForm()) {
  <app-modal (closed)="showForm.set(false)">
    <h2>{{ editing() ? 'تعديل عميل' : 'عميل جديد' }}</h2>
    <div class="field">
      <label>اسم العميل</label>
      <input [ngModel]="form().name" (ngModelChange)="patch('name', $event)" />
    </div>
    <div class="field">
      <label>جهة الاتصال</label>
      <input [ngModel]="form().contactName" (ngModelChange)="patch('contactName', $event)" />
    </div>
    <div class="row">
      <div class="field spacer"><label>الهاتف</label>
        <input [ngModel]="form().phone" (ngModelChange)="patch('phone', $event)" /></div>
      <div class="field spacer"><label>البريد</label>
        <input [ngModel]="form().email" (ngModelChange)="patch('email', $event)" /></div>
    </div>
    <div class="row">
      <div class="field spacer"><label>الرصيد</label>
        <input type="number" [ngModel]="form().accountBalance" (ngModelChange)="patch('accountBalance', +$event)" /></div>
      <div class="field spacer"><label>النشاط</label>
        <select [ngModel]="form().activityLevel" (ngModelChange)="patch('activityLevel', +$event)">
          @for (opt of activityOptions; track opt[0]) { <option [value]="opt[0]">{{ opt[1] }}</option> }
        </select></div>
    </div>
    <div class="field">
      <label>ملاحظات</label>
      <textarea rows="2" [ngModel]="form().notes" (ngModelChange)="patch('notes', $event)"></textarea>
    </div>
    <div class="row">
      <span class="spacer"></span>
      <button class="ghost" (click)="showForm.set(false)">إلغاء</button>
      <button (click)="save()" [disabled]="saving() || !form().name">حفظ</button>
    </div>
  </app-modal>
}
