<div class="page-head"><div><h1>المصروفات</h1><div class="sub">تتبع مصروفات المصنع</div></div></div>
<div class="row"><div class="field spacer"><label>من</label><input pInputText type="date" [ngModel]="from()" (ngModelChange)="from.set($event)"/></div><div class="field spacer"><label>إلى</label><input pInputText type="date" [ngModel]="to()" (ngModelChange)="to.set($event)"/></div><div class="field spacer"><label>النوع</label><p-select [options]="types()" optionLabel="name" optionValue="id" [showClear]="true" [ngModel]="typeFilter()" (ngModelChange)="typeFilter.set($event||'')"/></div><p-button label="تطبيق" (onClick)="applyFilters()"/></div>
<app-grid title="قائمة المصروفات" exportName="expenses" [columns]="columns" [source]="source" [rowActions]="actions" [exportPermission]="'expenses.export'" [createPermission]="'expenses.write'" (createClicked)="openCreate()"/>
<ng-template #actions let-row><div class="row-actions">@if(canWrite){<p-button icon="pi pi-pencil" [text]="true" (onClick)="openEdit(row)"/>}@if(canDelete){<p-button icon="pi pi-trash" severity="danger" [text]="true" (onClick)="remove(row)"/>}</div></ng-template>
<p-dialog [visible]="showForm()" (visibleChange)="showForm.set($event)" [modal]="true" [style]="{width:'520px'}" [header]="editing()?'تعديل مصروف':'مصروف جديد'"><div class="field"><label>نوع المصروف</label><p-select class="w-full" [options]="types()" optionLabel="name" optionValue="id" [ngModel]="form().expenseTypeId" (ngModelChange)="patch('expenseTypeId',$event)"/></div><div class="row"><div class="field spacer"><label>المبلغ</label><p-inputnumber [ngModel]="form().amount" (ngModelChange)="patch('amount',$event||0)"/></div><div class="field spacer"><label>التاريخ</label><input pInputText type="date" [ngModel]="form().date" (ngModelChange)="patch('date',$event)"/></div></div><div class="field"><label>المستفيد</label><input pInputText class="w-full" [ngModel]="form().payee" (ngModelChange)="patch('payee',$event)"/></div><div class="field"><label>ملاحظات</label><textarea pTextarea class="w-full" [ngModel]="form().notes" (ngModelChange)="patch('notes',$event)"></textarea></div><ng-template pTemplate="footer"><p-button label="إلغاء" [text]="true" (onClick)="showForm.set(false)"/><p-button label="حفظ" (onClick)="save()" [disabled]="saving()||!form().expenseTypeId"/></ng-template></p-dialog>
