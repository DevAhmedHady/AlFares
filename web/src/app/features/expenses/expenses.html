<app-grid
  title="المصروفات"
  exportName="expenses"
  [columns]="columns"
  [source]="service"
  [rowActions]="actions"
  [exportPermission]="'expenses.export'"
  [createPermission]="'expenses.write'"
  (createClicked)="openCreate()" />

<ng-template #actions let-row>
  @if (canWrite) { <button class="ghost" (click)="openEdit(row)">تعديل</button> }
  @if (canDelete) { <button class="ghost danger-text" (click)="remove(row)">حذف</button> }
</ng-template>

@if (showForm()) {
  <app-modal (closed)="showForm.set(false)">
    <h2>{{ editing() ? 'تعديل مصروف' : 'مصروف جديد' }}</h2>
    <div class="row">
      <div class="field spacer"><label>الفئة</label>
        <input [ngModel]="form().category" (ngModelChange)="patch('category', $event)" /></div>
      <div class="field spacer"><label>المبلغ</label>
        <input type="number" [ngModel]="form().amount" (ngModelChange)="patch('amount', +$event)" /></div>
    </div>
    <div class="row">
      <div class="field spacer"><label>التاريخ</label>
        <input type="date" [ngModel]="form().date" (ngModelChange)="patch('date', $event)" /></div>
      <div class="field spacer"><label>المستفيد</label>
        <input [ngModel]="form().payee" (ngModelChange)="patch('payee', $event)" /></div>
    </div>
    <div class="field">
      <label>ملاحظات</label>
      <textarea rows="2" [ngModel]="form().notes" (ngModelChange)="patch('notes', $event)"></textarea>
    </div>
    <div class="row">
      <span class="spacer"></span>
      <button class="ghost" (click)="showForm.set(false)">إلغاء</button>
      <button (click)="save()" [disabled]="saving() || !form().category">حفظ</button>
    </div>
  </app-modal>
}
