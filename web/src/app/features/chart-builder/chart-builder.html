<h2>{{ existing() ? 'تعديل رسم' : 'رسم جديد' }}</h2>

<div class="field">
  <label>العنوان</label>
  <input [ngModel]="title()" (ngModelChange)="title.set($event)" />
</div>

<div class="row">
  <div class="field spacer">
    <label>النوع</label>
    <select [ngModel]="type()" (ngModelChange)="type.set(+$event); refresh()">
      @for (opt of typeOptions; track opt[0]) { <option [value]="opt[0]">{{ opt[1] }}</option> }
    </select>
  </div>
  <div class="field spacer">
    <label>مصدر البيانات</label>
    <select [ngModel]="datasourceKey()" (ngModelChange)="datasourceKey.set($event); onDatasourceChange()">
      @for (ds of datasources(); track ds.key) { <option [value]="ds.key">{{ ds.displayName }}</option> }
    </select>
  </div>
</div>

<div class="row">
  <div class="field spacer">
    <label>حقل التصنيف (X)</label>
    <select [ngModel]="xField()" (ngModelChange)="xField.set($event); refresh()">
      @for (f of xOptions(); track f.key) { <option [value]="f.key">{{ f.displayName }}</option> }
    </select>
  </div>
  <div class="field spacer">
    <label>التجميع</label>
    <select [ngModel]="aggregation()" (ngModelChange)="aggregation.set(+$event); refresh()">
      @for (opt of aggOptions; track opt[0]) { <option [value]="opt[0]">{{ opt[1] }}</option> }
    </select>
  </div>
</div>

@if (needsY()) {
  <div class="field">
    <label>حقل القيمة (Y)</label>
    <select [ngModel]="yField()" (ngModelChange)="yField.set($event); refresh()">
      @for (f of yOptions(); track f.key) { <option [value]="f.key">{{ f.displayName }}</option> }
    </select>
  </div>
}

<div class="field">
  <label>لوحة الألوان</label>
  <select [ngModel]="paletteName()" (ngModelChange)="paletteName.set($event); refresh()">
    @for (name of paletteNames; track name) { <option [value]="name">{{ name }}</option> }
  </select>
  <div class="swatches">
    @for (c of palette(); track c) { <span class="swatch" [style.background]="c"></span> }
  </div>
</div>

@if (error()) { <p class="error-text">{{ error() }}</p> }

<div class="preview">
  <label>معاينة</label>
  <app-apex-chart [type]="type()" [series]="preview()" [colors]="palette()" />
</div>

<div class="row">
  <span class="spacer"></span>
  <button class="ghost" (click)="cancelled.emit()">إلغاء</button>
  <button (click)="save()" [disabled]="saving() || !title() || !xField()">حفظ</button>
</div>

<style>
  .swatches { display: flex; gap: 4px; margin-top: 6px; }
  .swatch { width: 22px; height: 22px; border-radius: 4px; border: 1px solid var(--border); }
  .preview { margin: 0.75rem 0; }
</style>
